# =====================================================================
# Configuracion general de la aplicacion
# Los valores sensibles se leen desde variables de entorno, con un
# valor por defecto para ejecucion local (sintaxis ${VAR:default}).
# =====================================================================

spring.application.name=backend
server.port=${SERVER_PORT:8080}

# ---------------------------------------------------------------------
# Conexion a PostgreSQL
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paco_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------
# JPA / Hibernate
# La estructura la administra schema.sql, por eso usamos "validate".
# ---------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------
# Inicializacion automatica de la base de datos (schema.sql y data.sql)
# "always" asegura que se ejecuten al levantar el contenedor.
# schema.sql se ejecuta antes que Hibernate, por eso la validacion
# (ddl-auto=validate) encuentra las tablas ya creadas.
# ---------------------------------------------------------------------
spring.sql.init.mode=always

# ---------------------------------------------------------------------
# Configuracion JWT
# JWT_SECRET debe ser una clave robusta en produccion.
# JWT_EXPIRATION en milisegundos (por defecto 24 horas).
# ---------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:cambia-esta-clave-secreta-por-una-mas-larga-y-segura-en-produccion-1234567890}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ---------------------------------------------------------------------
# Swagger / OpenAPI (springdoc)
# ---------------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
